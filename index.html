<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGI!!!</title>
  <style>
    :root {
      --bg1: #000000;
      --bg2: #050505;
      --bg3: #120000;
      --bg4: #3a0000;
      --card: rgba(8, 8, 8, 0.88);
      --card-border: rgba(255, 84, 84, 0.22);
      --accent: #ff5b5b;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --glow: rgba(255, 91, 91, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top, var(--glow), transparent 32%),
        radial-gradient(circle at 20% 80%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 22%),
        radial-gradient(circle at 80% 20%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 18%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 38%, var(--bg3) 70%, var(--bg4) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 18%, transparent) 0%, transparent 55%);
      filter: blur(60px);
      animation: drift 16s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .app {
      position: fixed;
      width: min(520px, calc(100vw - 32px));
      padding: 34px 26px 24px;
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.78),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px) saturate(128%);
      -webkit-backdrop-filter: blur(16px) saturate(128%);
      text-align: center;
      left: 0;
      top: 0;
      transform: translate3d(0, 0, 0);
      will-change: transform;
    }

    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 26px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.10), color-mix(in srgb, var(--accent) 32%, rgba(255,255,255,0.02)), rgba(255,255,255,0.02));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    h1 {
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 16px;
      color: #fff;
    }

    #period {
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--accent);
      text-shadow:
        0 0 10px color-mix(in srgb, var(--accent) 24%, transparent),
        0 0 28px color-mix(in srgb, var(--accent) 14%, transparent);
      transition: opacity 220ms ease, transform 220ms ease, filter 220ms ease;
      min-height: 1.1em;
      margin-top: 6px;
    }

    #period.pop {
      opacity: 0.25;
      transform: scale(0.975);
      filter: blur(1px);
    }

    .time {
      margin-top: 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .status {
      margin-top: 14px;
      font-size: 0.98rem;
      color: rgba(255, 255, 255, 0.88);
      min-height: 1.2em;
    }

    .lunch {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: left;
    }

    .lunch h2 {
      font-size: 0.98rem;
      margin-bottom: 8px;
      color: #fff;
    }

    .lunch-items {
      font-size: 0.9rem;
      line-height: 1.45;
      color: rgba(255,255,255,0.9);
      white-space: pre-line;
    }

    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-top: 14px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 55%, transparent);
      animation: pulse 1.6s ease-in-out infinite;
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
      will-change: transform, opacity;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.25); opacity: 1; }
    }

    @keyframes drift {
      from { transform: translate3d(-1%, -1%, 0) scale(1); }
      to { transform: translate3d(1%, 1%, 0) scale(1.05); }
    }

    @media (max-width: 640px) {
      .app {
        width: min(420px, calc(100vw - 20px));
        padding: 28px 18px 20px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <h1>Current Period</h1>
    <div id="period">Loading...</div>
    <div class="time" id="clock"></div>
    <div class="status" id="status"></div>

    <div class="lunch">
      <h2>Lunch Today</h2>
      <div class="lunch-items" id="lunchItems">Loading lunch...</div>
    </div>

    <div class="pulse" aria-hidden="true"></div>
  </main>

  <script>
    const schedules = {
      monday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      tuesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      wednesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      thursday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      friday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ]
    };

    const lunchMap = {
      monday: "Week 1 Monday:\\nTwisted Cheesy Breadsticks\\nSteamed Corn\\nCrispy Chicken Sandwich\\nBagel Bag with Cheese",
      tuesday: "Week 1 Tuesday:\\nFluffy French Toast Sticks\\nJuicy Breakfast Sausages\\nCrispy Hash Brown\\nBrunch for Lunch items\\nGrilled Cheese Sandwich\\nBagel Bag with Cheese",
      wednesday: "Week 1 Wednesday:\\nCrispy Popcorn Chicken Mash\\nRoasted Carrots\\nAll Natural Beef Hot Dog on a Bun\\nBagel Bag with Cheese",
      thursday: "Week 1 Thursday:\\nCreamy Mac and Cheese\\nSeasoned Garlic Breadstick\\nChicken Nuggets\\nBagel Bag with Cheese",
      friday: "Week 1 Friday:\\nCheese Pizza\\nPepperoni Pizza\\nChicken Caesar Salad\\nBagel Bag with Cheese",
      saturday: "No school today",
      sunday: "No school today"
    };

    const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    let lastPeriod = '';

    function toMinutes(time) {
      const [h, m] = time.split(':').map(Number);
      return h * 60 + m;
    }

    function getCurrentPeriod(now, schedule) {
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      for (const block of schedule) {
        const start = toMinutes(block.start);
        const end = toMinutes(block.end);
        if (currentMinutes >= start && currentMinutes < end) return block.name;
      }
      if (currentMinutes < toMinutes(schedule[0].start)) return 'Before School';
      return 'School Over';
    }

    function createConfetti(x, y) {
      const colors = ['#ff5b5b', '#ffffff', '#ff8a8a', '#ffd1d1', '#ff2d2d'];
      for (let i = 0; i < 24; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = x + 'px';
        piece.style.top = y + 'px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.transform = `translate(0, 0) rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);

        const angle = (Math.PI * 2 * i) / 24;
        const distance = 80 + Math.random() * 90;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;

        piece.animate([
          { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
          { transform: `translate(${dx}px, ${dy}px) rotate(${360 + Math.random() * 720}deg)`, opacity: 0 }
        ], {
          duration: 900 + Math.random() * 500,
          easing: 'cubic-bezier(.17,.67,.32,1.15)',
          fill: 'forwards'
        });

        setTimeout(() => piece.remove(), 1500);
      }
    }

    const app = document.getElementById('app');
    let posX = 20, posY = 20;
    let velX = 1.35, velY = 1.05;
    let lastBounce = 0;

    function moveApp() {
      const rect = app.getBoundingClientRect();
      const maxX = window.innerWidth - rect.width - 20;
      const maxY = window.innerHeight - rect.height - 20;

      posX += velX;
      posY += velY;

      let bounced = false;

      if (posX <= 20) {
        posX = 20;
        velX *= -1;
        bounced = true;
      } else if (posX >= maxX) {
        posX = maxX;
        velX *= -1;
        bounced = true;
      }

      if (posY <= 20) {
        posY = 20;
        velY *= -1;
        bounced = true;
      } else if (posY >= maxY) {
        posY = maxY;
        velY *= -1;
        bounced = true;
      }

      if (bounced) {
        const now = Date.now();
        if (now - lastBounce > 250) {
          const cx = posX + rect.width / 2;
          const cy = posY + rect.height / 2;
          createConfetti(cx, cy);
          lastBounce = now;
        }
      }

      app.style.transform = `translate3d(${posX}px, ${posY}px, 0)`;
      requestAnimationFrame(moveApp);
    }

    function updatePeriod() {
      const now = new Date();
      const day = days[now.getDay()];
      const schedule = schedules[day];

      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const periodEl = document.getElementById('period');
      const statusEl = document.getElementById('status');
      const lunchEl = document.getElementById('lunchItems');

      lunchEl.textContent = lunchMap[day] || "No lunch info available.";

      if (!schedule) {
        periodEl.textContent = 'No School';
        statusEl.textContent = 'Enjoy your day off.';
        lastPeriod = 'No School';
        return;
      }

      const current = getCurrentPeriod(now, schedule);

      if (current !== lastPeriod) {
        periodEl.classList.add('pop');
        setTimeout(() => {
          periodEl.textContent = current;
          periodEl.classList.remove('pop');
        }, 140);
        lastPeriod = current;
      } else {
        periodEl.textContent = current;
      }

      if (current === 'Before School') {
        statusEl.textContent = 'School has not started yet.';
      } else if (current === 'School Over') {
        statusEl.textContent = 'School is over for today.';
      } else if (current === 'No School') {
        statusEl.textContent = 'Enjoy your day off.';
      } else {
        statusEl.textContent = 'Updates automatically when the next class starts.';
      }
    }

    updatePeriod();
    moveApp();
    setInterval(updatePeriod, 1000);
    window.addEventListener('resize', () => {});
  </script>
</body>
</html>
