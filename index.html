<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiquidSchedule</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #050505, #6b0000, #b30000);
      color: white;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 600px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 80, 80, 0.25);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin-bottom: 20px;
    }

    #period {
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      font-weight: 800;
      color: #ff5a5a;
      text-shadow: 0 0 18px rgba(255, 90, 90, 0.25);
    }

    .time {
      margin-top: 14px;
      font-size: 1rem;
      opacity: 0.85;
    }

    .status {
      margin-top: 18px;
      font-size: 1.05rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Current Period</h1>
    <div id="period">Loading...</div>
    <div class="time" id="clock"></div>
    <div class="status" id="status"></div>
  </main>

  <script>
    const schedules = {
      monday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      tuesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      wednesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      thursday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      friday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ]
    };

    const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

    function toMinutes(time) {
      const [h, m] = time.split(':').map(Number);
      return h * 60 + m;
    }

    function updatePeriod() {
      const now = new Date();
      const day = days[now.getDay()];
      const schedule = schedules[day];

      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      if (!schedule) {
        document.getElementById('period').textContent = 'No School';
        document.getElementById('status').textContent = 'Enjoy your day off.';
        return;
      }

      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      let current = 'No School';

      for (const block of schedule) {
        const start = toMinutes(block.start);
        const end = toMinutes(block.end);

        if (currentMinutes >= start && currentMinutes < end) {
          current = block.name;
          break;
        }
      }

      if (current === 'No School') {
        if (currentMinutes < toMinutes(schedule[0].start)) {
          document.getElementById('status').textContent = 'School has not started yet.';
        } else {
          document.getElementById('status').textContent = 'School is over for today.';
        }
      } else {
        document.getElementById('status').textContent = 'It will change automatically when the next class starts.';
      }

      document.getElementById('period').textContent = current;
    }

    updatePeriod();
    setInterval(updatePeriod, 1000);
  </script>
</body>
</html>
