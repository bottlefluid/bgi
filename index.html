<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGI</title>
  <style>
    :root {
      --bg1: #000000;
      --bg2: #050505;
      --bg3: #120000;
      --bg4: #3a0000;
      --card: rgba(8, 8, 8, 0.84);
      --card-border: rgba(255, 84, 84, 0.22);
      --accent: #ff5b5b;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --glow: rgba(255, 91, 91, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at top, var(--glow), transparent 32%),
        radial-gradient(circle at 20% 80%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 22%),
        radial-gradient(circle at 80% 20%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 18%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 38%, var(--bg3) 70%, var(--bg4) 100%);
      transition: background 300ms ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 18%, transparent) 0%, transparent 55%);
      filter: blur(60px);
      animation: drift 16s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 760px;
      text-align: center;
      padding: 48px 34px 34px;
      border-radius: 30px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.78),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px) saturate(128%);
      -webkit-backdrop-filter: blur(16px) saturate(128%);
    }

    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 30px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.10), color-mix(in srgb, var(--accent) 32%, rgba(255,255,255,0.02)), rgba(255,255,255,0.02));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .theme-wrap {
      position: relative;
    }

    .theme-btn {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.92rem;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .theme-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.20);
    }

    .menu {
      position: absolute;
      top: 46px;
      right: 0;
      width: 190px;
      background: rgba(10, 10, 10, 0.96);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
      display: none;
      z-index: 20;
    }

    .menu.show {
      display: block;
    }

    .menu button {
      width: 100%;
      border: 0;
      background: transparent;
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      border-radius: 12px;
      cursor: pointer;
      transition: background 150ms ease;
      font-size: 0.92rem;
    }

    .menu button:hover {
      background: rgba(255,255,255,0.08);
    }

    h1 {
      font-size: clamp(1.7rem, 3.8vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
      color: #fff;
      text-shadow: 0 0 18px color-mix(in srgb, var(--accent) 12%, transparent);
    }

    #period {
      font-size: clamp(2.7rem, 9vw, 5.2rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--accent);
      text-shadow:
        0 0 10px color-mix(in srgb, var(--accent) 24%, transparent),
        0 0 28px color-mix(in srgb, var(--accent) 14%, transparent);
      transition: opacity 220ms ease, transform 220ms ease, filter 220ms ease, color 220ms ease;
      min-height: 1.1em;
      margin-top: 6px;
    }

    #period.pop {
      opacity: 0.25;
      transform: scale(0.975);
      filter: blur(1px);
    }

    .time {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.25px;
    }

    .status {
      margin-top: 18px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.88);
      min-height: 1.2em;
    }

    .lunch {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: left;
    }

    .lunch h2 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #fff;
    }

    .lunch-items {
      font-size: 0.95rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.9);
      white-space: pre-line;
    }

    .pulse {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-left: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 14px color-mix(in srgb, var(--accent) 55%, transparent);
      animation: pulse 1.6s ease-in-out infinite;
      vertical-align: middle;
      margin-top: 16px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.25); opacity: 1; }
    }

    @keyframes drift {
      from { transform: translate3d(-1%, -1%, 0) scale(1); }
      to { transform: translate3d(1%, 1%, 0) scale(1.05); }
    }

    @media (max-width: 640px) {
      .app { padding: 38px 22px 26px; border-radius: 24px; }
      .topbar { justify-content: center; }
      .menu { right: 50%; transform: translateX(50%); }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="theme-wrap">
        <button class="theme-btn" id="themeBtn">Themes</button>
        <div class="menu" id="themeMenu">
          <button data-theme="redblack">Red Black</button>
          <button data-theme="blue">Blue Night</button>
          <button data-theme="purple">Purple Glow</button>
          <button data-theme="green">Green Matrix</button>
          <button data-theme="gold">Gold Night</button>
          <button data-theme="ice">Ice Blue</button>
          <button data-theme="sunset">Sunset</button>
          <button data-theme="neon">Neon Storm</button>
        </div>
      </div>
    </div>

    <h1>Current Period</h1>
    <div id="period">Loading...</div>
    <div class="time" id="clock"></div>
    <div class="status" id="status"></div>

    <div class="lunch">
      <h2>Lunch Today</h2>
      <div class="lunch-items" id="lunchItems">Loading lunch...</div>
    </div>

    <span class="pulse" aria-hidden="true"></span>
  </main>

  <script>

        '--accent': '#ff5b5b', '--muted': 'rgba(255, 255, 255, 0.72)', '--glow': 'rgba(255, 91, 91, 0.12)'
      },
      blue: {
        '--bg1': '#020617', '--bg2': '#031026', '--bg3': '#08214a', '--bg4': '#0f3c7a',
        '--card': 'rgba(5, 12, 24, 0.82)', '--card-border': 'rgba(91, 160, 255, 0.22)',
        '--accent': '#5fb0ff', '--muted': 'rgba(235, 245, 255, 0.72)', '--glow': 'rgba(95, 176, 255, 0.12)'
      },
      purple: {
        '--bg1': '#080014', '--bg2': '#12001f', '--bg3': '#250036', '--bg4': '#43005f',
        '--card': 'rgba(12, 4, 20, 0.82)', '--card-border': 'rgba(192, 119, 255, 0.22)',
        '--accent': '#cf8cff', '--muted': 'rgba(248, 238, 255, 0.72)', '--glow': 'rgba(207, 140, 255, 0.12)'
      },
      green: {

        '--card': 'rgba(4, 14, 10, 0.82)', '--card-border': 'rgba(95, 255, 168, 0.20)',
        '--accent': '#67ffb2', '--muted': 'rgba(235, 255, 245, 0.72)', '--glow': 'rgba(103, 255, 178, 0.12)'
      },
      gold: {
        '--bg1': '#090400', '--bg2': '#140900', '--bg3': '#332000', '--bg4': '#5b3a00',
        '--card': 'rgba(18, 10, 2, 0.84)', '--card-border': 'rgba(255, 201, 92, 0.22)',
        '--accent': '#ffc95c', '--muted': 'rgba(255, 248, 235, 0.72)', '--glow': 'rgba(255, 201, 92, 0.12)'
      },
      ice: {
        '--bg1': '#040814', '--bg2': '#091a2f', '--bg3': '#12314d', '--bg4': '#1b5b78',
        '--card': 'rgba(6, 14, 24, 0.82)', '--card-border': 'rgba(145, 220, 255, 0.22)',
        '--accent': '#8de7ff', '--muted': 'rgba(235, 250, 255, 0.72)', '--glow': 'rgba(141, 231, 255, 0.12)'
      },
      sunset: {
        '--bg1': '#120000', '--bg2': '#250000', '--bg3': '#5a1300', '--bg4': '#b13a00',
        '--card': 'rgba(18, 7, 0, 0.82)', '--card-border': 'rgba(255, 146, 80, 0.22)',
        '--accent': '#ff9a5b', '--muted': 'rgba(255, 244, 235, 0.72)', '--glow': 'rgba(255, 154, 91, 0.12)'
      },
      neon: {
        '--bg1': '#000000', '--bg2': '#050012', '--bg3': '#12002a', '--bg4': '#2c005d',
        '--card': 'rgba(7, 3, 18, 0.84)', '--card-border': 'rgba(255, 90, 214, 0.22)',
        '--accent': '#ff5ad6', '--muted': 'rgba(248, 240, 255, 0.72)', '--glow': 'rgba(255, 90, 214, 0.12)'
      }
    };

    const schedules = {
      monday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      tuesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      wednesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      thursday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },

        { name: 'Period 9', start: '02:08', end: '02:50' },

      ],
      friday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ]
    };

    const lunchMap = {
      monday: "Week 1 Monday:\nTwisted Cheesy Breadsticks\nSteamed Corn\nCrispy Chicken Sandwich\nBagel Bag with Cheese",
      tuesday: "Week 1 Tuesday:\nFluffy French Toast Sticks\nJuicy Breakfast Sausages\nCrispy Hash Brown\nBrunch for Lunch items\nGrilled Cheese Sandwich\nBagel Bag with Cheese",
      wednesday: "Week 1 Wednesday:\nCrispy Popcorn Chicken Mash\nRoasted Carrots\nAll Natural Beef Hot Dog on a Bun\nBagel Bag with Cheese",
      thursday: "Week 1 Thursday:\nCreamy Mac and Cheese\nSeasoned Garlic Breadstick\nChicken Nuggets\nBagel Bag with Cheese",
      friday: "Week 1 Friday:\nCheese Pizza\nPepperoni Pizza\nChicken Caesar Salad\nBagel Bag with Cheese",
      saturday: "No school today",
      sunday: "No school today"
    };

    const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    let lastPeriod = '';

    function toMinutes(time) {
      const [h, m] = time.split(':').map(Number);
      return h * 60 + m;
    }

    function getCurrentPeriod(now, schedule) {
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      for (const block of schedule) {
        const start = toMinutes(block.start);
        const end = toMinutes(block.end);
        if (currentMinutes >= start && currentMinutes < end) return block.name;
      }
      if (currentMinutes < toMinutes(schedule[0].start)) return 'Before School';
      return 'School Over';
    }

    function updatePeriod() {
      const now = new Date();
      const day = days[now.getDay()];
      const schedule = schedules[day];

      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const periodEl = document.getElementById('period');
      const statusEl = document.getElementById('status');
      const lunchEl = document.getElementById('lunchItems');

      lunchEl.textContent = lunchMap[day] || "No lunch info available.";

      if (!schedule) {
        periodEl.textContent = 'No School';
        statusEl.textContent = 'Enjoy your day off.';
        lastPeriod = 'No School';
        return;
      }

      const current = getCurrentPeriod(now, schedule);

      if (current !== lastPeriod) {
        periodEl.classList.add('pop');
        setTimeout(() => {
          periodEl.textContent = current;
          periodEl.classList.remove('pop');
        }, 140);
        lastPeriod = current;
      } else {
        periodEl.textContent = current;
      }

      if (current === 'Before School') {
        statusEl.textContent = 'School has not started yet.';
      } else if (current === 'School Over') {
        statusEl.textContent = 'School is over for today.';
      } else if (current === 'No School') {
        statusEl.textContent = 'Enjoy your day off.';
      } else {
        statusEl.textContent = 'Updates automatically when the next class starts.';
      }
    }

    const themeBtn = document.getElementById('themeBtn');
    const themeMenu = document.getElementById('themeMenu');

    themeBtn.addEventListener('click', () => {
      themeMenu.classList.toggle('show');
    });

    themeMenu.addEventListener('click', e => {
      if (e.target.matches('button[data-theme]')) {
        Object.entries(themes[e.target.dataset.theme]).forEach(([key, value]) => {
          document.documentElement.style.setProperty(key, value);
        });
        localStorage.setItem('theme', e.target.dataset.theme);
        themeMenu.classList.remove('show');
      }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.theme-wrap')) themeMenu.classList.remove('show');
    });

    const saved = localStorage.getItem('theme') || 'redblack';
    Object.entries(themes[saved]).forEach(([key, value]) => {
      document.documentElement.style.setProperty(key, value);
    });

    updatePeriod();
    setInterval(updatePeriod, 1000);
  </script>
</body>
