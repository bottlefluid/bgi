<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Period</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(120, 0, 0, 0.35), transparent 34%),
        radial-gradient(circle at bottom, rgba(255, 40, 40, 0.08), transparent 42%),
        linear-gradient(135deg, #000000 0%, #050505 40%, #120000 72%, #3a0000 100%);
    }

    .app {
      width: 100%;
      max-width: 640px;
      text-align: center;
      padding: 44px 30px;
      border-radius: 28px;
      background: rgba(6, 6, 6, 0.82);
      border: 1px solid rgba(255, 80, 80, 0.22);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.75),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(14px) saturate(125%);
      -webkit-backdrop-filter: blur(14px) saturate(125%);
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      font-weight: 800;
      letter-spacing: 0.4px;
      margin-bottom: 18px;
      color: #ffffff;
    }

    #period {
      font-size: clamp(2.6rem, 9vw, 5rem);
      font-weight: 900;
      line-height: 1;
      color: #ff5b5b;
      text-shadow:
        0 0 10px rgba(255, 80, 80, 0.16),
        0 0 24px rgba(255, 80, 80, 0.10);
      transition: opacity 180ms ease, transform 180ms ease;
      min-height: 1.1em;
    }

    .time {
      margin-top: 14px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.2px;
    }

    .status {
      margin-top: 18px;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.88);
      min-height: 1.2em;
    }

    .fade {
      opacity: 0.35;
      transform: scale(0.985);
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Current Period</h1>
    <div id="period">Loading...</div>
    <div class="time" id="clock"></div>
    <div class="status" id="status"></div>
  </main>

  <script>
    const schedules = {
      monday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      tuesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      wednesday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      thursday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ],
      friday: [
        { name: 'Homeroom', start: '07:45', end: '07:55' },
        { name: 'Period 1', start: '07:58', end: '08:40' },
        { name: 'Period 2', start: '08:43', end: '09:28' },
        { name: 'Period 3', start: '09:31', end: '10:14' },
        { name: 'Period 4', start: '10:19', end: '11:04' },
        { name: 'Period 5', start: '11:07', end: '11:52' },
        { name: 'Period 6', start: '11:55', end: '12:35' },
        { name: 'Period 7', start: '12:37', end: '01:20' },
        { name: 'Period 8', start: '01:23', end: '02:07' },
        { name: 'Period 9', start: '02:08', end: '02:50' },
        { name: 'Homeroom', start: '02:50', end: '03:00' }
      ]
    };

    const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
    let lastPeriod = '';

    function toMinutes(time) {
      const [h, m] = time.split(':').map(Number);
      return h * 60 + m;
    }

    function getCurrentPeriod(now, schedule) {
      const currentMinutes = now.getHours() * 60 + now.getMinutes();

      for (const block of schedule) {
        const start = toMinutes(block.start);
        const end = toMinutes(block.end);
        if (currentMinutes >= start && currentMinutes < end) return block.name;
      }

      if (currentMinutes < toMinutes(schedule[0].start)) return 'Before School';
      return 'School Over';
    }

    function updatePeriod() {
      const now = new Date();
      const day = days[now.getDay()];
      const schedule = schedules[day];

      document.getElementById('clock').textContent =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      const periodEl = document.getElementById('period');
      const statusEl = document.getElementById('status');

      if (!schedule) {
        periodEl.textContent = 'No School';
        statusEl.textContent = 'Enjoy your day off.';
        lastPeriod = 'No School';
        return;
      }

      const current = getCurrentPeriod(now, schedule);

      if (current !== lastPeriod) {
        periodEl.classList.add('fade');
        setTimeout(() => {
          periodEl.textContent = current;
          periodEl.classList.remove('fade');
        }, 120);
        lastPeriod = current;
      } else {
        periodEl.textContent = current;
      }

      if (current === 'Before School') {
        statusEl.textContent = 'School has not started yet.';
      } else if (current === 'School Over') {
        statusEl.textContent = 'School is over for today.';
      } else if (current === 'No School') {
        statusEl.textContent = 'Enjoy your day off.';
      } else {
        statusEl.textContent = 'It will update automatically when the next class starts.';
      }
    }

    updatePeriod();
    setInterval(updatePeriod, 1000);
  </script>
</body>
</html>
